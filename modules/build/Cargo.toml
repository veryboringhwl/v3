[package]
name = "spicetify-build"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.6.0", features = ["derive"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
walkdir = "2.5.0"
regex = "1.12.3"
notify = "8.2.0"
open = "5.0.1"
reqwest = { version = "0.13.2", default-features = false, features = ["blocking", "json", "rustls"] }
grass = "0.13.4"
lightningcss = "1.0.0-alpha.57"
swc_core = { version = "62.0.0", features = ["common", "ecma_ast", "ecma_parser", "ecma_codegen", "ecma_visit", "ecma_transforms", "ecma_transforms_typescript", "ecma_transforms_react"] }
